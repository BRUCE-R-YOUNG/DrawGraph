<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>温度・湿度データグラフ</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    h2 {
      text-align: center;
      margin: 18px 0;
      font-size: 26px;
    }

    #control-area {
      background: #ffffff;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input[type="date"],
    select {
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
    }

    button {
      padding: 9px 16px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      text-align: center;
      padding: 14px;
      color: #333;
      background: #eef2f7;
      font-size: 14px;
    }

    #chart-container {
      width: 94%;
      margin: 24px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    canvas {
      width: 100% !important;
      height: 520px !important;
    }

    #average-table {
      width: 94%;
      margin: 0 auto 40px auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: center;
    }

    th {
      background: #f1f5f9;
    }
  </style>
</head>

<body>

  <h2>温度・湿度の推移（DynamoDB）</h2>

  <div id="control-area">
    <label for="datePicker">表示する日付：</label>
    <input type="date" id="datePicker">

    <button id="selectedDateBtn">選択した日付を表示</button>
    <button id="allDataBtn">全データ表示</button>

    <select id="averageSelect">
      <option value="">平均値を選択</option>
      <option value="daily">日付ごとの平均値</option>
      <option value="selected">選択日の平均値</option>
    </select>
  </div>

  <div id="status">データ取得中...</div>

  <div id="chart-container">
    <canvas id="myChart"></canvas>
  </div>

  <div id="average-table">
    <h3 style="text-align:center;">平均値一覧</h3>
    <table>
      <thead>
        <tr>
          <th>日付</th>
          <th>平均温度（℃）</th>
          <th>平均湿度（%）</th>
          <th>データ数</th>
        </tr>
      </thead>
      <tbody id="averageTableBody"></tbody>
    </table>
  </div>

  <script>
    const endpoint = "https://4cwtupj3ll.execute-api.us-east-1.amazonaws.com/iot_api/data/all";

    let myChart = null;
    let allData = [];

    function findValue(obj, keys) {
      if (!obj || typeof obj !== "object") {
        return undefined;
      }

      for (const key of keys) {
        if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") {
          return obj[key];
        }
      }

      for (const value of Object.values(obj)) {
        if (typeof value === "object" && value !== null) {
          const found = findValue(value, keys);
          if (found !== undefined && found !== null && found !== "") {
            return found;
          }
        }
      }

      return undefined;
    }

    function getTemperature(item) {
      const value = findValue(item, [
        "TEMPERATURE",
        "temperature",
        "Temperature",
        "TEMP",
        "temp"
      ]);

      return Number(value);
    }

    function getHumidity(item) {
      const value = findValue(item, [
        "HUMIDITY",
        "humidity",
        "Humidity",
        "HUMI",
        "humi"
      ]);

      return Number(value);
    }

    function getTimestamp(item) {
      const value = findValue(item, [
        "TIMESTAMP",
        "timestamp",
        "Timestamp",
        "time",
        "TIME"
      ]);

      return Number(value);
    }

    function timestampToDate(timestamp) {
      let ts = Number(timestamp);

      if (isNaN(ts)) {
        return null;
      }

      const digit = String(Math.floor(ts)).length;

      if (digit === 13) {
        return new Date(ts);
      }

      if (digit === 11) {
        return new Date((ts / 10) * 1000);
      }

      if (digit === 10) {
        return new Date(ts * 1000);
      }

      return new Date(ts * 1000);
    }

    function formatDateOnly(timestamp) {
      const date = timestampToDate(timestamp);

      if (!date || isNaN(date.getTime())) {
        return "";
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function formatDateTime(timestamp) {
      const date = timestampToDate(timestamp);

      if (!date || isNaN(date.getTime())) {
        return "";
      }

      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");

      return `${month}/${day} ${hour}:${min}`;
    }

    function getValidData(data) {
      const validData = data.map(item => {
        const timestamp = getTimestamp(item);
        const temperature = getTemperature(item);
        const humidity = getHumidity(item);

        return {
          timestamp: timestamp,
          date: formatDateOnly(timestamp),
          label: formatDateTime(timestamp),
          temperature: temperature,
          humidity: humidity
        };
      }).filter(item => {
        return (
          !isNaN(item.timestamp) &&
          !isNaN(item.temperature) &&
          !isNaN(item.humidity) &&
          item.date !== ""
        );
      }).sort((a, b) => a.timestamp - b.timestamp);

      console.log("✅ 変換後の有効データ:", validData);

      return validData;
    }

    function drawChart(labels, temperatures, humidities, chartType) {
      const ctx = document.getElementById("myChart").getContext("2d");

      if (myChart) {
        myChart.destroy();
      }

      myChart = new Chart(ctx, {
        type: chartType,
        data: {
          labels: labels,
          datasets: [
            {
              label: "温度 (℃)",
              data: temperatures,
              borderColor: "rgba(255, 99, 132, 1)",
              backgroundColor: "rgba(255, 99, 132, 0.3)",
              borderWidth: 2,
              pointRadius: chartType === "line" ? 3 : 0,
              tension: 0.3,
              yAxisID: "y"
            },
            {
              label: "湿度 (%)",
              data: humidities,
              borderColor: "rgba(54, 162, 235, 1)",
              backgroundColor: "rgba(54, 162, 235, 0.3)",
              borderWidth: 2,
              pointRadius: chartType === "line" ? 3 : 0,
              tension: 0.3,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: "index",
            intersect: false
          },
          plugins: {
            legend: {
              position: "top"
            }
          },
          scales: {
            x: {
              title: {
                display: true,
                text: chartType === "bar" ? "日付" : "日時"
              },
              ticks: {
                maxRotation: 60,
                minRotation: 45
              }
            },
            y: {
              type: "linear",
              position: "left",
              title: {
                display: true,
                text: "温度 (℃)"
              },
              min: 0,
              max: 40
            },
            y1: {
              type: "linear",
              position: "right",
              title: {
                display: true,
                text: "湿度 (%)"
              },
              min: 0,
              max: 100,
              grid: {
                drawOnChartArea: false
              }
            }
          }
        }
      });
    }

    function showAllData() {
      document.getElementById("averageSelect").value = "";
      document.getElementById("average-table").style.display = "none";

      const validData = getValidData(allData);

      if (validData.length === 0) {
        document.getElementById("status").textContent =
          "温度・湿度として使えるデータがありません";

        console.log("❌ 元データの1件目:", allData[0]);
        return;
      }

      const labels = validData.map(item => item.label);
      const temperatures = validData.map(item => item.temperature);
      const humidities = validData.map(item => item.humidity);

      document.getElementById("status").textContent =
        `全データ：${validData.length} 件`;

      drawChart(labels, temperatures, humidities, "line");
    }

    function showSelectedDate() {
      document.getElementById("averageSelect").value = "";
      document.getElementById("average-table").style.display = "none";

      const selectedDate = document.getElementById("datePicker").value;

      if (!selectedDate) {
        alert("日付を選択してください");
        return;
      }

      const validData = getValidData(allData)
        .filter(item => item.date === selectedDate);

      if (validData.length === 0) {
        document.getElementById("status").textContent =
          `${selectedDate} のデータはありません`;
        return;
      }

      const labels = validData.map(item => item.label);
      const temperatures = validData.map(item => item.temperature);
      const humidities = validData.map(item => item.humidity);

      document.getElementById("status").textContent =
        `${selectedDate} のデータ：${validData.length} 件`;

      drawChart(labels, temperatures, humidities, "line");
    }

    function calculateDailyAverage() {
      const validData = getValidData(allData);
      const grouped = {};

      validData.forEach(item => {
        if (!grouped[item.date]) {
          grouped[item.date] = {
            tempSum: 0,
            humiSum: 0,
            count: 0
          };
        }

        grouped[item.date].tempSum += item.temperature;
        grouped[item.date].humiSum += item.humidity;
        grouped[item.date].count += 1;
      });

      return Object.keys(grouped).sort().map(date => {
        const g = grouped[date];

        return {
          date: date,
          avgTemp: Number((g.tempSum / g.count).toFixed(1)),
          avgHumi: Number((g.humiSum / g.count).toFixed(1)),
          count: g.count
        };
      });
    }

    function showDailyAverage() {
      const averages = calculateDailyAverage();

      if (averages.length === 0) {
        document.getElementById("status").textContent =
          "平均値を計算できるデータがありません";
        return;
      }

      const labels = averages.map(item => item.date);
      const temperatures = averages.map(item => item.avgTemp);
      const humidities = averages.map(item => item.avgHumi);

      document.getElementById("status").textContent =
        `日付ごとの平均値：${averages.length} 日分`;

      drawChart(labels, temperatures, humidities, "bar");
      renderAverageTable(averages);
    }

    function showSelectedDateAverage() {
      const selectedDate = document.getElementById("datePicker").value;

      if (!selectedDate) {
        alert("日付を選択してください");
        return;
      }

      const averages = calculateDailyAverage()
        .filter(item => item.date === selectedDate);

      if (averages.length === 0) {
        document.getElementById("status").textContent =
          `${selectedDate} の平均値を計算できません`;
        return;
      }

      const avg = averages[0];

      document.getElementById("status").textContent =
        `${selectedDate} の平均値：温度 ${avg.avgTemp} ℃、湿度 ${avg.avgHumi} %`;

      drawChart(
        [avg.date],
        [avg.avgTemp],
        [avg.avgHumi],
        "bar"
      );

      renderAverageTable(averages);
    }

    function renderAverageTable(averages) {
      const tbody = document.getElementById("averageTableBody");
      tbody.innerHTML = "";

      averages.forEach(item => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${item.date}</td>
          <td>${item.avgTemp}</td>
          <td>${item.avgHumi}</td>
          <td>${item.count}</td>
        `;

        tbody.appendChild(tr);
      });

      document.getElementById("average-table").style.display = "block";
    }

    function handleAverageSelect() {
      const value = document.getElementById("averageSelect").value;

      if (value === "daily") {
        showDailyAverage();
      } else if (value === "selected") {
        showSelectedDateAverage();
      }
    }

    function fetchData() {
      $.getJSON(endpoint)
        .done(function (response) {
          console.log("✅ 受信データ:", response);

          allData = response.items || [];

          if (allData.length === 0) {
            document.getElementById("status").textContent = "データがありません";
            return;
          }

          console.log("✅ 元データ1件目:", allData[0]);
          console.log("✅ device_data:", allData[0].device_data);

          const validData = getValidData(allData);

          if (validData.length === 0) {
            document.getElementById("status").textContent =
              "温度・湿度として使えるデータがありません";

            console.log("❌ 取得失敗。元データ1件目:", allData[0]);
            return;
          }

          const latestDate = validData[validData.length - 1].date;
          document.getElementById("datePicker").value = latestDate;

          showAllData();
        })
        .fail(function (jqxhr, textStatus, error) {
          console.error("データ取得エラー:", textStatus, error);
          document.getElementById("status").textContent = "データ取得エラー";
          alert("データの取得に失敗しました");
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("selectedDateBtn").addEventListener("click", showSelectedDate);
      document.getElementById("allDataBtn").addEventListener("click", showAllData);
      document.getElementById("averageSelect").addEventListener("change", handleAverageSelect);

      fetchData();

      setInterval(fetchData, 60000);
    });
  </script>

</body>
</html>
